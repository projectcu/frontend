apiVersion: batch/v1
kind: Job
metadata:
  name: ci-metrics-job
  namespace: monitoring
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: metrics
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Pushing CI/CD metrics to Pushgateway"

              # Build metric
              echo "ci_build_status{service=\"frontend\"} 1" | curl --data-binary @- \
              http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_build

              # Deploy metrics (env-wise)
              echo "ci_deploy_status{env=\"dev\",service=\"frontend\"} 1" | curl --data-binary @- \
              http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_dev

              echo "ci_deploy_status{env=\"stage\",service=\"frontend\"} 1" | curl --data-binary @- \
              http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_stage

              echo "ci_deploy_status{env=\"prod\",service=\"frontend\"} 1" | curl --data-binary @- \
              http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_prod
