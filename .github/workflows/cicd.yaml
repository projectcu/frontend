name: Frontend-CICD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build React app
        run: CI=false npm run build

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.DEMOAPP_REGISTRY_USERNAME }}
          password: ${{ secrets.DEMOAPP_REGISTRY_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          echo "Building image: $IMAGE"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # 📊 CI METRICS (BUILD)
      - name: Send Build Metrics to Prometheus
        if: always()
        run: |
          STATUS=0
          if [ "${{ job.status }}" == "success" ]; then STATUS=1; fi

          echo "ci_build_status $STATUS" | curl --data-binary @- \
          http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_build


  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks

      - name: Deploy to DEV
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          echo "Deploying DEV with $IMAGE"
          sed -i "s|image: nginx|image: $IMAGE|g" k8s/dev/deployment.yaml
          kubectl apply -f k8s/dev/

      # 📊 DEV DEPLOY METRICS
      - name: Send Dev Deploy Metrics
        if: always()
        run: |
          STATUS=0
          if [ "${{ job.status }}" == "success" ]; then STATUS=1; fi

          echo "ci_dev_deploy_status $STATUS" | curl --data-binary @- \
          http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_dev


  deploy-stage:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: stage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks

      - name: Deploy to STAGE
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          echo "Deploying STAGE with $IMAGE"
          sed -i "s|image: nginx|image: $IMAGE|g" k8s/stage/deployment.yaml
          kubectl apply -f k8s/stage/

      # 📊 STAGE METRICS
      - name: Send Stage Deploy Metrics
        if: always()
        run: |
          STATUS=0
          if [ "${{ job.status }}" == "success" ]; then STATUS=1; fi

          echo "ci_stage_deploy_status $STATUS" | curl --data-binary @- \
          http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_stage


  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks

      - name: Deploy to PROD
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          echo "Deploying PROD with $IMAGE"
          sed -i "s|image: nginx|image: $IMAGE|g" k8s/prod/deployment.yaml
          kubectl apply -f k8s/prod/

      # 📊 PROD METRICS
      - name: Send Prod Deploy Metrics
        if: always()
        run: |
          STATUS=0
          if [ "${{ job.status }}" == "success" ]; then STATUS=1; fi

          echo "ci_prod_deploy_status $STATUS" | curl --data-binary @- \
          http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091/metrics/job/frontend_prod
