name: Frontend-CICD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build React app
        run: CI=false npm run build

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.DEMOAPP_REGISTRY_USERNAME }}
          password: ${{ secrets.DEMOAPP_REGISTRY_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          docker build -t $IMAGE .
          docker push $IMAGE

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks --overwrite-existing

      - name: Deploy to DEV
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          sed -i "s|image: nginx|image: $IMAGE|g" k8s/dev/deployment.yaml
          kubectl apply -n dev -f k8s/dev/

  deploy-stage:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: stage

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks --overwrite-existing

      - name: Deploy to STAGE
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          sed -i "s|image: nginx|image: $IMAGE|g" k8s/stage/deployment.yaml
          kubectl apply -n stage -f k8s/stage/

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment: prod

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group project-demo --name projectaks --overwrite-existing

      - name: Deploy to PROD
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          sed -i "s|image: nginx|image: $IMAGE|g" k8s/prod/deployment.yaml
          kubectl apply -n prod -f k8s/prod/

          kubectl rollout status deployment/frontend -n prod --timeout=60s || {
            echo "Frontend rollout still in progress after 60 seconds."
            kubectl get deployment/frontend -n prod
            kubectl get pods -n prod -l app=frontend -o wide
            kubectl describe deployment/frontend -n prod
            echo "Pipeline will continue. Kubernetes rollout is still running in AKS."
          }
