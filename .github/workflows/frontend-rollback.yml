name: Frontend-Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - stage
          - prod

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group project-demo \
            --name projectaks \
            --overwrite-existing

      - name: Show rollout history
        run: |
          kubectl rollout history deployment/frontend \
            -n ${{ github.event.inputs.environment }}

      - name: Rollback frontend deployment
        run: |
          kubectl rollout undo deployment/frontend \
            -n ${{ github.event.inputs.environment }}

      - name: Verify rollback
        run: |
          kubectl rollout status deployment/frontend \
            -n ${{ github.event.inputs.environment }}

      - name: Show pods after rollback
        run: |
          kubectl get pods \
            -n ${{ github.event.inputs.environment }}
