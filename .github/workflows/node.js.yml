name: Build, Test, and Deploy to AKS

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: frontend

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build React app
        run: |
          CI=false npm run build

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.DEMOAPP_REGISTRY_USERNAME }}
          password: ${{ secrets.DEMOAPP_REGISTRY_PASSWORD }}

      - name: Build & Push Image
        id: build
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_id }}
          echo "Building image: $IMAGE"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Debug Image
        run: echo "Deploying Image: ${{ needs.build.outputs.image }}"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Set AKS context
        run: az aks get-credentials --resource-group project-demo --name projectaks

      - name: Deploy to DEV
        run: |
          kubectl apply -f k8s/dev/
          kubectl set image deployment/frontend frontend=${{ needs.build.outputs.image }} -n dev

  deploy-stage:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: stage

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Debug Image
        run: echo "Deploying Image: ${{ needs.build.outputs.image }}"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Set AKS context
        run: az aks get-credentials --resource-group project-demo --name projectaks

      - name: Deploy to STAGE
        run: |
          kubectl apply -f k8s/stage/
          kubectl set image deployment/frontend frontend=${{ needs.build.outputs.image }} -n stage

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment: prod   # 👈 requires approval

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Debug Image
        run: echo "Deploying Image: ${{ needs.build.outputs.image }}"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.DEMOAPP_AZURE_CREDENTIALS }}

      - name: Set AKS context
        run: az aks get-credentials --resource-group project-demo --name projectaks

      - name: Deploy to PROD
        run: |
          kubectl apply -f k8s/prod/
          kubectl set image deployment/frontend frontend=${{ needs.build.outputs.image }} -n prod
